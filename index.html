<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lan AI - No Login</title>
<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
window.pipeline = pipeline;
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#212121;color:#ececec;height:100dvh;display:flex;flex-direction:column}
.header{background:#2f2f2f;padding:14px;text-align:center;font-weight:600;border-bottom:1px solid #444}
#stat{font-size:11px;opacity:0.6;margin-top:4px}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.5;white-space:pre-wrap}
.user{background:#10a37f;color:white;align-self:flex-end;border-bottom-right-radius:4px}
.ai{background:#2f2f2f;align-self:flex-start;border-bottom-left-radius:4px}
.sys{background:#444;align-self:center;font-size:12px}
.box{padding:10px;background:#2f2f2f;border-top:1px solid #444}
.row{display:flex;gap:8px;align-items:flex-end}
#txt{flex:1;background:#404040;border:none;border-radius:20px;padding:12px 16px;color:#ececec;resize:none;max-height:120px;font-size:16px}
#btn{background:#10a37f;border:none;width:44px;height:44px;border-radius:50%;color:white;font-size:20px}
#btn:disabled{opacity:0.4}
</style>
</head>
<body>
  <div class="header">
    lan AI - No Login
    <div id="stat">Loading otak 100MB...</div>
  </div>
  <div id="chat"><div class="msg sys">Tunggu 30 detik kak, lan AI lagi download otak ke HP kamu...</div></div>
  <div class="box">
    <div class="row">
      <textarea id="txt" placeholder="Loading..." rows="1" disabled></textarea>
      <button id="btn" disabled>↑</button>
    </div>
  </div>

<script type="module">
let generator;
let chatHistory = "Kamu adalah lan AI, AI buatan kakak. Jawab santai, gaul, pake 'kak'. Jago JavaScript. Kalo gak tau bilang gak tau.\n";

const chatDiv = document.getElementById('chat');
const txt = document.getElementById('txt');
const btn = document.getElementById('btn');
const stat = document.getElementById('stat');

async function init() {
  try {
    generator = await window.pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', {
      progress_callback: (x) => {
        if(x.status === 'progress') {
          stat.textContent = `Download ${x.progress.toFixed(0)}%... Sabar ya kak`;
        }
      }
    });
    stat.textContent = 'Online | 100% Offline | No Login';
    addMsg('lan AI udah ready kak! Otak 100MB udah di HP. Chat sepuasnya, gratis, gak perlu login 🔥', 'ai');
    txt.disabled = false; btn.disabled = false; txt.placeholder = 'Ketik pesan...';
  } catch(e) {
    addMsg('Gagal load. Pake Chrome/Edge terbaru ya kak!', 'sys');
  }
}
init();

btn.onclick = kirim;
txt.onkeydown = e => { if(e.key==='Enter' &&!e.shiftKey){ e.preventDefault(); kirim(); }};
txt.oninput = () => { txt.style.height='auto'; txt.style.height=txt.scrollHeight+'px'; };

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
  return div;
}

async function kirim() {
  let text = txt.value.trim();
  if(!text || btn.disabled ||!generator) return;

  addMsg(text, 'user');
  chatHistory += `Kakak: ${text}\nlan AI:`;
  txt.value = ''; txt.style.height='auto'; btn.disabled = true;

  const typing = addMsg('lan AI mikir...', 'ai');
  stat.textContent = 'Sedang mikir...';

  try {
    const result = await generator(chatHistory, {
      max_new_tokens: 100,
      temperature: 0.7,
      do_sample: true,
      repetition_penalty: 1.1
    });
    let reply = result[0].generated_text.split('lan AI:').pop().trim();
    reply = reply.split('Kakak:')[0].trim();
    typing.remove();
    addMsg(reply, 'ai');
    chatHistory += ` ${reply}\n`;
    stat.textContent = 'Online | 100% Offline | No Login';
  } catch(e) {
    typing.remove();
    addMsg('Error kak, kepanjangan kayaknya. Coba yang pendek', 'ai');
  }

  btn.disabled = false;
}
</script>
</body>
</html>
