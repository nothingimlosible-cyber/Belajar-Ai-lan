<!DOCTYPE html>
<html>
<head>
  <title>lan AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #212121; --card: #2f2f2f; --text: #ececec; --accent: #10a37f; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

   .header { background: var(--card); padding: 12px 16px; border-bottom: 1px solid #444; text-align: center; font-weight: 600; }
   .stat { font-size: 11px; opacity: 0.6; margin-top: 4px; }

    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
   .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
   .user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
   .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
   .sys { background: #444; align-self: center; font-size: 12px; opacity: 0.8; border-radius: 8px; }

   .input-area { padding: 12px; background: var(--card); border-top: 1px solid #444; }
   .input-row { display: flex; gap: 8px; align-items: flex-end; }
    #prompt { flex: 1; background: #404040; border: 1px solid #555; border-radius: 20px; padding: 12px 16px; color: var(--text); resize: none; max-height: 120px; font-family: inherit; font-size: 16px; }
    #prompt:focus { outline: none; border-color: var(--accent); }
    #sendBtn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #sendBtn:disabled { opacity: 0.3; }

   .menu { display: flex; gap: 8px; margin-bottom: 8px; overflow-x: auto; }
   .menu button { background: #404040; border: 1px solid #555; color: var(--text); padding: 6px 12px; border-radius: 16px; font-size: 12px; white-space: nowrap; cursor: pointer; }
   .menu button:hover { background: #505050; }

    #trainModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; padding: 20px; }
   .modal-content { background: var(--card); border-radius: 12px; padding: 16px; max-width: 500px; margin: 20px auto; max-height: 80vh; display: flex; flex-direction: column; }
    #dataLatih { flex: 1; background: #000; border: 1px solid #555; color: var(--text); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    lan AI
    <div class="stat" id="stat">Brain: Kosong | Tap "Latih" buat mulai</div>
  </div>

  <div id="chat">
    <div class="msg sys">lan AI v2.1 siap. Latih aku dulu biar bisa jawab.</div>
  </div>

  <div class="input-area">
    <div class="menu">
      <button onclick="showTrain()">🧠 Latih</button>
      <button onclick="saveModel()">💾 Simpan Otak</button>
      <button onclick="document.getElementById('fileInput').click()">📂 Load Otak</button>
      <button onclick="resetModel()">🗑️ Reset</button>
    </div>
    <div class="input-row">
      <textarea id="prompt" placeholder="Kirim pesan ke lan AI..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generate()}"></textarea>
      <button id="sendBtn" onclick="generate()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div id="trainModal">
    <div class="modal-content">
      <h3 style="margin-bottom:12px">Latih lan AI</h3>
      <p style="font-size:12px;opacity:0.7;margin-bottom:8px">Format: ### Perintah:... ### Jawaban:...</p>
      <textarea id="dataLatih" placeholder="### Perintah: hai&#10;### Jawaban: Hai juga kak!&#10;&#10;### Perintah: siapa kamu&#10;### Jawaban: Aku lan AI"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="train()" style="flex:1;background:var(--accent);border:none;color:white;padding:10px;border-radius:8px">Mulai Latih</button>
        <button onclick="hideTrain()" style="background:#555;border:none;color:white;padding:10px 16px;border-radius:8px">Tutup</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadModel(event)">

<script>
// ===== LAN AI V2.1 - CHATGPT STYLE =====
let vocab = [], stoi = {}, itos = {}, model = null;
const blockSize = 32, nEmbed = 64;
const START = '<s>', END = '</s>', SEP = '###';
let training = false;

const chatEl = document.getElementById('chat');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('sendBtn');

// Auto resize textarea
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
});

function tokenize(text) {
  return text.toLowerCase().match(/[a-z0-9]+|<[^>]+>|[{}();=<>!+\-*/.,?]|\n|###/g) || ;
}

function buildVocab(text) {
  const words = [START, END,...tokenize(text)];
  vocab = [...new Set([...vocab,...words])];
  stoi = {}; itos = {};
  vocab.forEach((w, i) => { stoi[w] = i; itos[i] = w; });
}

function initModel() {
  const V = vocab.length;
  model = {
    tokEmbed: Array(V).fill().map(() => Array(nEmbed).fill().map(() => (Math.random()-0.5)*0.1)),
    posEmbed: Array(blockSize).fill().map(() => Array(nEmbed).fill().map(() => (Math.random()-0.5)*0.1)),
    W1: Array(nEmbed).fill().map(() => Array(nEmbed*4).fill().map(() => (Math.random()-0.5)*0.1)),
    W2: Array(nEmbed*4).fill().map(() => Array(V).fill().map(() => (Math.random()-0.5)*0.1)),
  };
  updateStat();
}

function forward(x) {
  let h = x.map((tok, i) => model.tokEmbed[tok].map((e, j) => e + model.posEmbed[i][j]));
  let avg = Array(nEmbed).fill(0);
  h.forEach(v => v.forEach((e, j) => avg[j] += e / h.length));
  let h1 = model.W1.map(row => Math.max(0, row.reduce((s, w, j) => s + w * avg[j], 0)));
  let logits = model.W2.map(row => row.reduce((s, w, j) => s + w * h1[j], 0));
  return logits;
}

async function train() {
  if(training) return;
  training = true;
  const text = document.getElementById('dataLatih').value;
  if(!text.trim()) { training = false; return; }

  addMsg('Mulai training lan AI... HP mungkin lag 10-20 detik', 'sys');
  hideTrain();

  buildVocab(text);
  if(!model || model.tokEmbed.length!== vocab.length) initModel();

  const tokens = [START,...tokenize(text), END].map(w => stoi[w]);
  for(let epoch = 0; epoch < 100; epoch++) {
    for(let i = 0; i < tokens.length - blockSize; i++) {
      const x = tokens.slice(i, i + blockSize);
      const y = tokens[i + blockSize];
      const logits = forward(x);
      const maxLogit = Math.max(...logits);
      const exps = logits.map(l => Math.exp(l - maxLogit));
      const sumExps = exps.reduce((a,b) => a+b, 0);
      const probs = exps.map(e => e / sumExps);
      const lr = 0.05;
      const dlogits = probs.map((p, j) => j === y? p - 1 : p);
      for(let j = 0; j < model.W2.length; j++) {
        for(let k = 0; k < model.W2[j].length; k++) {
          model.W2[j][k] -= lr * dlogits[k] * 0.01;
        }
      }
    }
    if(epoch % 25 === 0) await new Promise(r => setTimeout(r, 10));
  }

  document.getElementById('dataLatih').value = '';
  updateStat();
  addMsg('lan AI selesai belajar! Coba chat sekarang.', 'sys');
  training = false;
}

function generate() {
  if(!model) return addMsg('Latih aku dulu kak! Tap tombol "Latih"', 'sys');
  let promptText = promptEl.value.trim();
  if(!promptText || training) return;

  addMsg(promptText, 'user');
  promptEl.value = '';
  promptEl.style.height = 'auto';
  sendBtn.disabled = true;

  setTimeout(() => {
    let ctx = [stoi[START], stoi[SEP], stoi['perintah'], stoi[':'],...tokenize(promptText).map(w => stoi[w]), stoi[SEP], stoi['jawaban'], stoi[':']].filter(x => x!== undefined);
    let out = ;
    for(let i = 0; i < 80; i++) {
      const x = ctx.slice(-blockSize);
      const logits = forward(x);
      const next = logits.indexOf(Math.max(...logits));
      if(next === stoi[END] || next === stoi[SEP]) break;
      ctx.push(next);
      out.push(itos);
    }
    addMsg(out.join('').replace(/ ###/g, '\n').trim() || '...', 'ai');
    sendBtn.disabled = false;
  }, 100);
}

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function updateStat() {
  const v = vocab.length;
  const p = model? (model.tokEmbed.length * nEmbed + model.W1.length * nEmbed * 4 + model.W2.length * vocab.length) : 0;
  const iq = Math.min(200, Math.floor(v * 0.3 + p * 0.0005));
  document.getElementById('stat').innerText = `Vocab: ${v} | IQ: ${iq} | ${p? 'Siap chat' : 'Butuh dilatih'}`;
}

function showTrain() { document.getElementById('trainModal').style.display = 'block'; }
function hideTrain() { document.getElementById('trainModal').style.display = 'none'; }

function saveModel() {
  if(!model) return addMsg('Latih dulu baru bisa simpan!', 'sys');
  const blob = new Blob([JSON.stringify({vocab, model})], {type: "application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `lan-ai-otak.json`;
  a.click();
  addMsg('Otak berhasil disimpan!', 'sys');
}

function loadModel(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    const data = JSON.parse(ev.target.result);
    vocab = data.vocab; model = data.model;
    vocab.forEach((w, i) => { stoi[w] = i; itos[i] = w; });
    updateStat();
    addMsg('Otak lama berhasil dimuat! lan AI inget semuanya.', 'sys');
  };
  reader.readAsText(file);
}

function resetModel() {
  if(confirm('Yakin reset otak lan AI? Semua ilmu ilang.')) {
    vocab = ; stoi = {}; itos = {}; model = null;
    localStorage.removeItem('lanAI_v2');
    updateStat();
    chatEl.innerHTML = '<div class="msg sys">lan AI direset. Latih ulang ya kak 😭</div>';
  }
}

// Auto-load
const saved = localStorage.getItem('lanAI_v2');
if(saved) {
  const data = JSON.parse(saved);
  vocab = data.vocab; model = data.model;
  vocab.forEach((w, i) => { stoi[w] = i; itos[i] = w; });
  updateStat();
  addMsg('lan AI udah pinter dari sesi kemarin!', 'sys');
}
setInterval(() => { if(model) localStorage.setItem('lanAI_v2', JSON.stringify({vocab, model})); }, 5000);
</script>
</body>
</html>
